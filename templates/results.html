<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Prediction - Results</title>
    
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #8b5cf6;
            --secondary-accent: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 1.5rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Blobs for Glassmorphism */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: var(--primary-accent);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: var(--secondary-accent);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 80px) scale(1.1); }
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .score-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.05);
            border: 6px solid var(--success-color);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3), inset 0 0 20px rgba(16, 185, 129, 0.2);
            position: relative;
            animation: pulse 3s infinite alternate cubic-bezier(0.4, 0, 0.6, 1);
            margin-bottom: 4rem;
        }

        @keyframes pulse {
            0% { 
                box-shadow: 0 0 25px rgba(16, 185, 129, 0.3), inset 0 0 15px rgba(16, 185, 129, 0.2); 
                transform: scale(1);
            }
            100% { 
                box-shadow: 0 0 50px rgba(16, 185, 129, 0.6), inset 0 0 30px rgba(16, 185, 129, 0.4); 
                transform: scale(1.05);
            }
        }

        .score-value {
            font-size: 5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.8);
            margin-top: -15px; /* Offset for better vertical alignment with label underneath */
        }

        .score-circle::after {
            content: 'Predicted Score';
            position: absolute;
            bottom: 45px;
            font-size: 0.95rem;
            color: var(--success-color);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
        }



        @media (max-width: 768px) {
            .container {
                padding: 3rem 2rem;
                border-radius: 24px;
            }
            .header h1 {
                font-size: 2.5rem;
            }
            .score-circle {
                width: 200px;
                height: 200px;
            }
            .score-value {
                font-size: 4rem;
            }
            .score-circle::after {
                bottom: 35px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Ambient Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="header">
            <h1>Analysis Complete</h1>
            <p>Here evaluates the AI approximation of your wine's true quality</p>
        </div>
        
        <div class="score-circle">
            <div class="score-value">{{ results }}</div>
        </div>


    </div>
</body>
</html>
